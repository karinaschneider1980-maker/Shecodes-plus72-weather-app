<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="src/styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/axios@1.13.2/dist/axios.min.js"></script>
  <title>Weather app</title>
</head>

<body>
  <div class="weather-app">

    <header>
      <form class="search-form" id="search-form">
        <input type="search" placeholder="Enter a city.." required id="search-form-input" class="search-form-input" />
        <input type="submit" value="Search" class="search-form-button" />
      </form>
    </header>

    <main class="weather-main">
      <div class="current-weather">
        <h1 class="weather-app-city" id="city">Uithoorn</h1>

        <div class="weather-temperature-container">
          <div id="icon"></div>

          <div class="weather-temperature">
            <span class="weather-value" id="temperature">11</span>
            <span class="weather-unit">°C</span>
          </div>
        </div>
        <p class="weather-details">
          <span id="time"></span>
          <span id="description"></span>
        </p>
        <div class="weather-extra">
          Humidity: <span id="humidity"></span>
          Wind: <span id="wind"></span>
        </div>
      </div>
      <div class="weather-forecast" id="forecast"></div>
    </main>

    <footer class="weather-footer">
      This project was coded by
      <a href="https://github.com/karinaschneider1980-maker" target="_blank"> Karina Schneider </a>, in
      <a href="https://github.com/karinaschneider1980-maker/Shecodes-plus72-weather-app" target="_blank">open-sourced on
        GitHub </a>,
      and
      <a href="https://karina-weather-app.netlify.app/" target="_blank">hosted on Netlify </a>
    </footer>
  </div>
  <script src="src/index.js"></script>
</body>

</html>
